<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            background-color: rgb(224, 87, 187);
            top: 20vh;
            bottom: 10vh;
            text-align: center;
        }
        .TaskBox{
            height: 80vh;
            background-color: rgb(138, 115, 238);
            margin:10px;
            text-align: center;
            font-style: oblique;
            border-color: brown;
            position: relative;
            margin-top: 30px;
        }
        button{
            height: 25px;
            width: 25px;
            position: absolute;
        }
        #button1{
            top: 10px;
            left: 10px;
            background-color: green;

        }
        #button2{
            top:10px;
            right:20px;
            background-color:green;
        }
        #button3{
            top:45%;
            right:45%;
            background-color: green;
        }
        #button4{
            bottom:30px;
            left:20px;
            background-color: green;
        }

        #button5{
            bottom:20px;
            right:20px;
            background-color: green;

        }


    </style>
</head>
<body>
    <nav>Task Bar</nav>
    <div class="TaskBox">TaskBox
    <button id="button1">A</button>
    <button id="button2">B</button>
    <button id="button3">C</button>
    <button id="button4">D</button>
    <button id="button5">E</button>
        </div>
</body>
</html>
